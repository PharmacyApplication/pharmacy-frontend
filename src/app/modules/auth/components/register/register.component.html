<div class="register-container">
  <mat-card class="register-card">
    <mat-card-header>
      <mat-card-title>Create Account</mat-card-title>
      <mat-card-subtitle>Register to order medicines</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <p class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</p>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Full Name</mat-label>
          <input matInput formControlName="fullName" placeholder="Enter your full name" />
          <mat-error *ngIf="registerForm.get('fullName')?.hasError('required')">Full name is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" placeholder="Enter your email" />
          <mat-error *ngIf="registerForm.get('email')?.hasError('required')">Email is required</mat-error>
          <mat-error *ngIf="registerForm.get('email')?.hasError('email')">Enter a valid email</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" placeholder="Minimum 6 characters" />
          <mat-error *ngIf="registerForm.get('password')?.hasError('required')">Password is required</mat-error>
          <mat-error *ngIf="registerForm.get('password')?.hasError('minlength')">Minimum 6 characters</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Phone Number (optional)</mat-label>
          <input matInput formControlName="phoneNumber" placeholder="Enter phone number" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Address (optional)</mat-label>
          <textarea matInput formControlName="address" placeholder="Enter your address" rows="2"></textarea>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" class="full-width" [disabled]="loading">
          {{ loading ? 'Creating account...' : 'Register' }}
        </button>
      </form>

      <p class="login-link">
        Already have an account? <a routerLink="/auth/login">Login</a>
      </p>
    </mat-card-content>
  </mat-card>
</div>
