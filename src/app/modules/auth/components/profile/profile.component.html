<div class="profile-container">
  <mat-card class="profile-card">
    <mat-card-header>
      <mat-card-title>My Profile</mat-card-title>
      <mat-card-subtitle *ngIf="user">
        {{ user.email }} &nbsp;·&nbsp;
        <span class="role-badge">{{ user.role }}</span>
      </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="profileForm" (ngSubmit)="onUpdate()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Full Name</mat-label>
          <input matInput formControlName="fullName" placeholder="Enter your full name" />
          <mat-error *ngIf="profileForm.get('fullName')?.hasError('required')">Full name is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Phone Number</mat-label>
          <input matInput formControlName="phoneNumber" placeholder="Enter phone number" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Address</mat-label>
          <textarea matInput formControlName="address" placeholder="Enter your address" rows="3"></textarea>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" class="full-width" [disabled]="loading">
          {{ loading ? 'Updating...' : 'Update Profile' }}
        </button>

      </form>
    </mat-card-content>
  </mat-card>
</div>
